name: Rector

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - rector.php
      - composer.json
      - composer.lock
      - .github/workflows/rector.yml
  pull_request:
    branches:
      - main

jobs:
  rector:
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@1.0.0
    with:
      name: Run Rector (dry-run)
      run: composer rector
      php-version: '8.5'
