name: Rector

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - rector.php
      - composer.json
      - composer.lock
      - .github/workflows/rector.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  rector:
    strategy:
      matrix:
        php-version: ['8.5']
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@1.0.0
    with:
      name: Run Rector (dry-run)
      run: composer rector
      php-version: ${{ matrix.php-version }}
      private-repos: openemr-internal
    secrets:
      app-id: ${{ secrets.OPENEMR_INTERNAL_CLIENT_ID }}
      app-private-key: ${{ secrets.OPENEMR_INTERNAL_APP_PRIVATE_KEY }}
