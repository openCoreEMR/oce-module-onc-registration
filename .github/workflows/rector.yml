name: Rector

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  rector:
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@0.0.2
    with:
      name: Run Rector (dry-run)
      run: composer rector
      php-version: '8.5'
