name: PHPStan

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - phpstan.neon
      - phpstan.neon.dist
      - phpstan-baseline.neon
      - composer.json
      - composer.lock
      - .github/workflows/phpstan.yml
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  phpstan:
    strategy:
      matrix:
        php-version: ['8.5']
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@1.0.0
    with:
      name: Run PHPStan
      run: composer phpstan
      php-version: ${{ matrix.php-version }}
