name: PHP Syntax Check

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - .github/workflows/php-syntax-check.yml
  pull_request:
    branches:
      - main
    paths:
      - '**.php'
      - .github/workflows/php-syntax-check.yml

jobs:
  php-syntax-check:
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@0.0.2
    with:
      name: PHP Syntax Check
      run: composer php-lint
      install-deps: false
      php-version: '8.5'
