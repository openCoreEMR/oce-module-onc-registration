name: Composer Validate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  composer-validate:
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@0.0.2
    with:
      name: Validate composer.json
      run: composer validate --strict
      install-deps: false
      php-version: '8.5'
