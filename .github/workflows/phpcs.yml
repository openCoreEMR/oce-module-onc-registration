name: PHP CodeSniffer

on:
  push:
    branches:
      - main
    paths:
      - '**.php'
      - '.phpcs.xml*'
      - 'phpcs.xml*'
      - composer.json
      - composer.lock
      - .github/workflows/phpcs.yml
  pull_request:
    branches:
      - main

jobs:
  phpcs:
    strategy:
      matrix:
        php-version: ['8.5']
    uses: openCoreEMR/github-workflows-public/.github/workflows/php-composer-script.yml@1.0.0
    with:
      name: Run PHP CodeSniffer
      run: composer phpcs
      php-version: ${{ matrix.php-version }}
